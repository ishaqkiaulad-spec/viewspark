<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ViewSpark - Ultimate Creator Hub Network</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <style>
        /* ViewSpark App Design */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f0c1b 0%, #1a103c 100%);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-container {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 40px 30px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
        }

        .logo-box {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 15px;
        }

        .play-icon {
            width: 45px;
            height: 45px;
            background: linear-gradient(45deg, #00c6ff, #0072ff);
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 20px rgba(0, 198, 255, 0.4);
        }

        .play-icon::after {
            content: '';
            width: 0;
            height: 0;
            border-top: 10px solid transparent;
            border-bottom: 10px solid transparent;
            border-left: 16px solid #fff;
            margin-left: 4px;
        }

        .logo-text {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: 1px;
            background: linear-gradient(45deg, #00c6ff, #ff007f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tagline {
            color: #aaa;
            font-size: 14px;
            margin-bottom: 40px;
        }

        .google-btn {
            width: 100%;
            background: #ffffff;
            color: #1a103c;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(255, 255, 255, 0.1);
        }

        .google-btn:hover {
            background: #f1f1f1;
            transform: translateY(-2px);
        }

        .google-icon {
            width: 22px;
            height: 22px;
        }

        /* Dashboard Screen (Login ke baad dikhegi) */
        .dashboard-container {
            display: none;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            width: 100%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
        }

        .user-pic {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid #00c6ff;
            margin-bottom: 15px;
        }

        .logout-btn {
            margin-top: 20px;
            background: linear-gradient(45deg, #ff0055, #ff007f);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="login-container" id="loginScreen">
        <div class="logo-box">
            <div class="play-icon"></div>
            <div class="logo-text">VIEWSPARK</div>
        </div>
        <div class="tagline">Ultimate Creator Hub Network</div>
        
        <button class="google-btn" id="googleLoginBtn">
            <img class="google-icon" src="https://fonts.gstatic.com/s/i/productlogos/googleg/v6/web-24dp/copy_of_googleg_24dp.png" alt="Google">
            Continue with Google
        </button>
    </div>

    <div class="dashboard-container" id="dashboardScreen">
        <img class="user-pic" id="userPhoto" src="" alt="User">
        <h2>Welcome, <span id="userName">Creator</span>!</h2>
        <p style="color: #aaa; margin-top: 5px;" id="userEmail"></p>
        <p style="margin-top: 20px; color: #00c6ff; font-weight: bold;">Aapka ViewSpark Dashboard Successfully Active Ho Gaya Hy! 🎉</p>
        <button class="logout-btn" id="logoutBtn">Log Out</button>
    </div>

    <script>
        // Aapka real Firebase code yahan set kar diya hy
        const firebaseConfig = {
          apiKey: "AIzaSyCOjnWb9p6brNC-FSfZmycNEnl3Rl1Yj0w",
          authDomain: "viewspark-c90fe.firebaseapp.com",
          projectId: "viewspark-c90fe",
          storageBucket: "viewspark-c90fe.firebasestorage.app",
          messagingSenderId: "1096935175707",
          appId: "1:1096935175707:web:b6010773a134e066096abe"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // Google Login logic with Popup
        const googleBtn = document.getElementById('googleLoginBtn');
        googleBtn.addEventListener('click', () => {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider)
                .then((result) => {
                    console.log("Login Successful!");
                })
                .catch((error) => {
                    alert("Login Error: " + error.message);
                });
        });

        // Auth state change (Login status track karna)
        auth.onAuthStateChanged((user) => {
            const loginScreen = document.getElementById('loginScreen');
            const dashboardScreen = document.getElementById('dashboardScreen');

            if (user) {
                loginScreen.style.display = 'none';
                dashboardScreen.style.display = 'block';

                document.getElementById('userName').innerText = user.displayName;
                document.getElementById('userEmail').innerText = user.email;
                document.getElementById('userPhoto').src = user.photoURL || 'https://via.placeholder.com/80';
            } else {
                loginScreen.style.display = 'block';
                dashboardScreen.style.display = 'none';
            }
        });

        // Logout
        document.getElementById('logoutBtn').addEventListener('click', () => {
            auth.signOut();
        });
    </script>
</body>
</html>
